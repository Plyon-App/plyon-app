<!DOCTYPE html>
<html>
<head>
  <title>Migración Sport Field</title>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, doc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const config = {
      apiKey: "AIzaSyDz4OrhHg8p8kmbJGfZaOAyyodieuzBa-0",
      authDomain: "plyon-production.firebaseapp.com",
      projectId: "plyon-production",
      storageBucket: "plyon-production.firebasestorage.app",
      messagingSenderId: "44475337879",
      appId: "1:44475337879:web:28afc9a778708b93286dd2",
    };

    const app = initializeApp(config);
    const db = getFirestore(app);

    window.migrate = async () => {
      const userId = 'tNDGVWYPZhMO5bPIel1Q4r9kYX93';
      console.log('Iniciando migración...');
      
      const ref = collection(db, 'users', userId, 'football_activities');
      const snap = await getDocs(ref);
      
      let updated = 0;
      for (const d of snap.docs) {
        if (!d.data().sport) {
          await updateDoc(doc(db, 'users', userId, 'football_activities', d.id), { sport: 'football' });
          updated++;
        }
      }
      
      console.log(`✅ Migración completa: ${updated} partidos actualizados`);
      alert(`Migración exitosa: ${updated} partidos actualizados con sport='football'`);
    };
  </script>
</head>
<body>
  <h1>Migración de Sport Field</h1>
  <button onclick="migrate()">Ejecutar Migración</button>
  <p>Esto agregará sport='football' a todos los partidos existentes</p>
</body>
</html>
